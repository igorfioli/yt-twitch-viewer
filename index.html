```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Stream Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#000;
display:flex;
height:100vh;
overflow:hidden;
font-family:sans-serif;
}

/* área do vídeo */

#videoArea{
flex:3;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

/* chat */

#chat{
flex:1;
border:0;
}

/* barra superior */

#top{
position:fixed;
top:0;
left:0;
right:0;
background:#111;
padding:8px;
display:flex;
gap:8px;
z-index:10;

opacity:1;
transition:opacity .4s;
}

#top.hidden{
opacity:0;
pointer-events:none;
}

input{
padding:6px;
border:none;
border-radius:4px;
}

button{
padding:6px 10px;
background:#6441a5;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="top">

<input id="kick" value="rnakano">
<input id="twitch" value="rnakano">

<button onclick="abrir()">Abrir</button>

</div>

<div id="videoArea">
<video id="video" controls autoplay></video>
</div>

<iframe id="chat"></iframe>

<script>

async function abrir(){

const canal = document.getElementById("kick").value
const twitch = document.getElementById("twitch").value

const res = await fetch(`https://kick.com/api/v2/channels/${canal}`)
const data = await res.json()

const hls = data.playback_url

const video = document.getElementById("video")

if(Hls.isSupported()){

const hlsPlayer = new Hls()

hlsPlayer.loadSource(hls)
hlsPlayer.attachMedia(video)

}

video.src = hls

document.getElementById("chat").src =
`https://www.twitch.tv/embed/${twitch}/chat?parent=igorfioli.github.io`

}

abrir()

/* esconder barra */

let timer

function esconderBarra(){
document.getElementById("top").classList.add("hidden")
}

function mostrarBarra(){

const top = document.getElementById("top")

top.classList.remove("hidden")

clearTimeout(timer)

timer = setTimeout(esconderBarra,3000)

}

document.addEventListener("mousemove",(e)=>{

if(e.clientY < 80){
mostrarBarra()
}

})

timer = setTimeout(esconderBarra,3000)

</script>

</body>
</html>
```
