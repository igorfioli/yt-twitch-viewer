<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kick Source Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#000;
display:flex;
height:100vh;
overflow:hidden;
font-family:sans-serif;
}

#videoArea{
flex:3;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

#chat{
flex:1;
border:0;
}

#top{
position:fixed;
top:0;
left:0;
right:0;
background:#111;
padding:6px;
display:flex;
gap:8px;
z-index:10;
}

input{
padding:6px;
border:none;
border-radius:4px;
}

button{
padding:6px 10px;
background:#6441a5;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="top">

<input id="kick" placeholder="Canal Kick">
<input id="twitch" placeholder="Chat Twitch">

<button onclick="abrir()">Abrir</button>

</div>

<div id="videoArea">
<video id="video" controls autoplay></video>
</div>

<iframe id="chat"></iframe>

<script>

async function abrir(){

const canal = document.getElementById("kick").value
const twitch = document.getElementById("twitch").value

/* pegar info da live */

const res = await fetch(`https://kick.com/api/v2/channels/${canal}`)
const data = await res.json()

const hls = data.playback_url

const video = document.getElementById("video")

if(Hls.isSupported()){

const hlsPlayer = new Hls()

hlsPlayer.loadSource(hls)
hlsPlayer.attachMedia(video)

}

video.src = hls

/* chat twitch */

document.getElementById("chat").src =
`https://www.twitch.tv/embed/${twitch}/chat?parent=igorfioli.github.io&darkpopout`

}

</script>

</body>
</html>
